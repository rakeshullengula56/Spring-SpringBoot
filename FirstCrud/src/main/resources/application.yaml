spring:
  application:
    name: FirstCrud
# 1. Datasource Properties
  datasource:
    url: jdbc:h2:mem:testdb
    driverClassName: org.h2.Driver
    username: sa
    password: password

  # 2. H2 Console Properties
  h2:
    console:
      enabled: true
      path: /h2-console

  # 3. JPA / Hibernate Properties
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
